    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: auto; }

      :root {
        --bg:         #0a0c12;
        --bg-card:    #111520;
        --surface:    #161b28;
        --border:     #252c45;
        --border-2:   #323d62;

        --text-1:     #f2e6ec;
        --text-2:     #c5c1bd;
        --text-3:     #aaa9ad;
        --text-4:     #71669a;

        --amber:      #e0924f;
        --amber-light:#e8a96e;
        --amber-dim:  rgba(212,135,74,0.10);
        --amber-glow: rgba(212,135,74,0.18);
        --amber-bd:   rgba(212,135,74,0.25);

        --wa:         #097e34;
        --wa-dim:     rgba(37,211,102,0.08);
        --wa-glow:    rgba(37,211,102,0.25);

        --clay-radius:    22px;
        --clay-radius-lg: 32px;
        --clay-radius-sm: 14px;
        --clay-shadow:
          0 2px 0 rgba(255,255,255,0.07) inset,
          0 -2px 0 rgba(0,0,0,0.25) inset,
          0 12px 40px rgba(0,0,0,0.45),
          0 2px 8px rgba(0,0,0,0.3);
        --clay-shadow-sm:
          0 1px 0 rgba(255,255,255,0.06) inset,
          0 -1px 0 rgba(0,0,0,0.2) inset,
          0 8px 24px rgba(0,0,0,0.35),
          0 2px 4px rgba(0,0,0,0.2);
        --clay-shadow-hover:
          0 2px 0 rgba(255,255,255,0.09) inset,
          0 -2px 0 rgba(0,0,0,0.3) inset,
          0 20px 56px rgba(0,0,0,0.5),
          0 4px 12px rgba(0,0,0,0.35);

        --font-display: 'ClashDisplay-Variable', 'Clash Display', sans-serif;
        --font: 'Satoshi-Variable', 'Satoshi', -apple-system, BlinkMacSystemFont, sans-serif;
        --font-mono: 'SF Mono', 'Fira Code', ui-monospace, monospace;

        --fs-10:  clamp(0.6rem,  0.9vw,  0.7rem);
        --fs-12:  clamp(0.7rem,  1vw,    0.8rem);
        --fs-14:  clamp(0.8rem,  1.2vw,  1rem);
        --fs-16:  clamp(0.9rem,  1.4vw,  1rem);
        --fs-18:  clamp(1rem,    1.6vw,  1.125rem);
        --fs-20:  clamp(1.1rem,  1.8vw,  2rem);
        --fs-24:  clamp(1.2rem,  2.2vw,  1.5rem);
        --fs-32:  clamp(1.5rem,  3vw,    2rem);
        --fs-48:  clamp(2rem,    4.5vw,  3rem);
        --fs-hero:clamp(2.6rem,  5.5vw,  5rem);

        --max-w:   1340px;
        --gutter:  clamp(20px, 5vw, 64px);
        --sec-pad: clamp(80px, 10vw, 130px);
      }

      body {
        background: var(--bg);
        color: var(--text-1);
        font-family: var(--font);
        font-weight: 400;
        font-size: var(--fs-16);
        line-height: 1.65;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      #root { position: relative; }

      ::-webkit-scrollbar { width: 3px; }
      ::-webkit-scrollbar-track { background: var(--bg); }
      ::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 2px; }

      input, select, textarea {
        color-scheme: dark;
        font-family: var(--font);
      }
      select option { background: var(--surface); }

      /* Noise grain */
      body::after {
        content: '';
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        opacity: 0.024;
        pointer-events: none;
        z-index: 9999;
        mix-blend-mode: soft-light;
      }

      .clay {
        background: var(--bg-card);
        border-radius: var(--clay-radius);
        box-shadow: var(--clay-shadow);
        border: 1px solid var(--border);
        transition: box-shadow 0.3s, transform 0.3s;
      }
      .clay:hover {
        box-shadow: var(--clay-shadow-hover);
        transform: translateY(-4px) scale(1.008);
      }
      .clay-sm {
        border-radius: var(--clay-radius-sm);
        box-shadow: var(--clay-shadow-sm);
        border: 1px solid var(--border);
      }
      .clay-btn {
        border-radius: 27px;
        box-shadow:
          0 1px 0 rgba(255,255,255,0.12) inset,
          0 -1px 0 rgba(0,0,0,0.3) inset,
          0 6px 20px rgba(0,0,0,0.35);
        transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
        cursor: pointer;
        border: none;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        text-decoration: none;
        font-family: var(--font);
        font-weight: 600;
      }
      .clay-btn:hover {
        transform: translateY(-2px) scale(1.03);
        box-shadow:
          0 1px 0 rgba(255,255,255,0.14) inset,
          0 -1px 0 rgba(0,0,0,0.35) inset,
          0 12px 32px rgba(0,0,0,0.45);
      }
      .clay-btn:active { transform: translateY(1px) scale(0.98); }

      .wrap {
        max-width: var(--max-w);
        margin: 0 auto;
        padding: 0 var(--gutter);
      }

      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
      @keyframes floatY {
        0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)}
      }
      @keyframes pulseGlow {
        0%,100%{box-shadow:0 0 8px var(--amber)} 50%{box-shadow:0 0 18px var(--amber)}
      }
      @keyframes shimmer {
        0%{background-position:200% center}
        100%{background-position:-200% center}
      }

      h1, h2, h3 {
        font-family: var(--font-display);
        letter-spacing: -0.03em;
      }
    </style>
  </head>

  </body>
